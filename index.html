<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Streak</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container">
  <h2>The Streak Tracker</h2>

  <div id="auth-section">
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Log In</button>
    <button id="forgotBtn">Forgot Password?</button>
    <p id="authMessage"></p>
  </div>

  <div id="app-section" style="display:none;">
    <p id="streakDisplay">Loading…</p>
    <div class="actions">
      <button id="markBtn">Mark Today</button>
      <button id="reflectBtn">Reflection</button>
      <button id="calendarBtn">📆 Calendar</button>
      <button id="aiSummaryBtn">AI Summary</button>
      <button id="resetBtn">Reset Streak</button>
      <button id="logoutBtn">Sign Out</button>
    </div>
  </div>
</div>

<div id="reflectionModal" class="overlay" style="display:none;">
  <div class="modal-box">
    <textarea id="reflectionText" rows="6"
      placeholder="What do you want to write today?"></textarea>
    <button id="saveReflectionBtn">Save</button>
  </div>
</div>

<div id="calendarOverlay" class="overlay" style="display:none;">
  <div class="calendar-box">
    <div class="calendar-header">
      <button id="prevMonthBtn">◀</button>

      <div class="calendar-selectors">
        <select id="monthSelect"></select>
        <select id="yearSelect"></select>
      </div>

      <button id="nextMonthBtn">▶</button>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<!-- ✅ NEW: AI SUMMARY MODAL -->
<div id="aiSummaryOverlay" class="overlay" style="display:none;">
  <div class="summary-box">
    <div class="summary-header">
      <h3>📊 Reflection Analysis</h3>
      <button id="closeSummaryBtn">✕</button>
    </div>
    <div class="summary-content">
      <!-- Date Range Selector -->
      <div class="date-range-selector">
        <div class="date-inputs">
          <div class="date-input-group">
            <label>From Date:</label>
            <input type="date" id="startDate" />
          </div>
          <div class="date-input-group">
            <label>To Date:</label>
            <input type="date" id="endDate" />
          </div>
        </div>
        <div class="quick-options">
          <button class="quick-btn" data-days="7">Last 7 Days</button>
          <button class="quick-btn" data-days="30">Last 30 Days</button>
          <button class="quick-btn" data-days="streak">Current Streak</button>
          <button class="quick-btn" data-days="all">All Time</button>
        </div>
        <button id="applyDateRangeBtn">Analyze</button>
      </div>
      
      <canvas id="emotionChart" width="200" height="220"></canvas>
      <div id="summaryText"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyANFF4TkIpc3vB3_jwA5xK6rh4EryigVVI",
  authDomain: "the-streak2.firebaseapp.com",
  projectId: "the-streak2",
  storageBucket: "the-streak2.firebasestorage.app",

};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const functions = firebase.app().functions("us-central1");

async function logDebug(msg, error = null) {
  if (error) {
    window.console.error(msg, error);
  } else {
    window.console.log(msg);
  }
  const debugDiv = document.getElementById("debugConsole");
  if (!debugDiv) return;
  const entry = document.createElement("div");
  entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (error) {
    entry.style.color = "#ff4444";
    entry.innerText += ` - ERROR: ${error.message || error}`;
  }
  debugDiv.appendChild(entry);
  debugDiv.scrollTop = debugDiv.scrollHeight;

  try {
    if (typeof db !== "undefined" && db) {
      const logEntry = {
        message: msg,
        error: error ? (error.message || String(error)) : null,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userId: (typeof auth !== "undefined" && auth?.currentUser?.uid) ? auth.currentUser.uid : "unauthenticated"
      };
      await db.collection("debug_logs").add(logEntry);
    }
  } catch (err) {
    window.console.error("Failed to save log to backend:", err);
  }
}

logDebug("App initialized");

const summarizeReflections = functions.httpsCallable("summarizeReflections");
const notifyUnauthorizedAccess = functions.httpsCallable("notifyUnauthorizedAccess");

const authSection = document.getElementById("auth-section");
const appSection = document.getElementById("app-section");
const streakDisplay = document.getElementById("streakDisplay");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const signupBtn = document.getElementById("signupBtn");
const loginBtn = document.getElementById("loginBtn");
const forgotBtn = document.getElementById("forgotBtn");
const authMessage = document.getElementById("authMessage");

/* AUTH BUTTON LOGIC */
signupBtn.onclick = async () => {
  try {
    await auth.createUserWithEmailAndPassword(emailInput.value, passwordInput.value);
    authMessage.innerText = "Account created successfully!";
  } catch (err) {
    if (err.code === "auth/email-already-in-use") {
      authMessage.innerText = "This email ID is already associated with an account. Please log in instead.";
    } else {
      authMessage.innerText = err.message;
    }
  }
};

loginBtn.onclick = async () => {
  try {
    await auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value);
    authMessage.innerText = "";
  } catch (err) {
    if (
      err.code === "auth/wrong-password" ||
      err.code === "auth/invalid-credential" ||
      err.code === "auth/invalid-login-credentials" ||
      (err.message && err.message.includes("INVALID_LOGIN_CREDENTIALS"))
    ) {
      authMessage.innerText = "Entered password is incorrect. You have been notified via email.";
      // Send security alert email
      try {
        await notifyUnauthorizedAccess({ email: emailInput.value });
      } catch (notifyErr) {
        logDebug("Failed to send security notification", notifyErr);
      }
    } else {
      authMessage.innerText = err.message;
    }
  }
};

forgotBtn.onclick = async () => {
  try {
    await auth.sendPasswordResetEmail(emailInput.value);
    authMessage.innerText = "Password reset email sent! Please check your inbox! (even the spam folders)";
  } catch (err) {
    authMessage.innerText = err.message;
  }
};

const markBtn = document.getElementById("markBtn");
const reflectBtn = document.getElementById("reflectBtn");
const calendarBtn = document.getElementById("calendarBtn");
const logoutBtn = document.getElementById("logoutBtn");
const aiSummaryBtn = document.getElementById("aiSummaryBtn");
const resetBtn = document.getElementById("resetBtn");

const reflectionModal = document.getElementById("reflectionModal");
const calendarOverlay = document.getElementById("calendarOverlay");
const aiSummaryOverlay = document.getElementById("aiSummaryOverlay");

const reflectionText = document.getElementById("reflectionText");
const saveBtn = document.getElementById("saveReflectionBtn");
const closeSummaryBtn = document.getElementById("closeSummaryBtn");

const calendarGrid = document.getElementById("calendarGrid");
const prevMonthBtn = document.getElementById("prevMonthBtn");
const nextMonthBtn = document.getElementById("nextMonthBtn");
const monthSelect = document.getElementById("monthSelect");
const yearSelect = document.getElementById("yearSelect");

function todayDate() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

let calendarYear, calendarMonth;
let activeDate = null;
let currentStreak = 0;

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

auth.onAuthStateChanged(async user => {
  if (!user) {
    authSection.style.display = "block";
    appSection.style.display = "none";
    logDebug("User logged out");
    return;
  }
  authSection.style.display = "none";
  appSection.style.display = "block";
  logDebug(`User logged in: ${user.email} (${user.uid})`);

  try {
    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      logDebug("User doc missing, creating...");
      await ref.set({ streak: 0, lastCheck: null });
    }

    currentStreak = snap.data().streak || 0;
    streakDisplay.innerText = `Current streak: ${currentStreak} days`;
    logDebug(`Streak loaded: ${currentStreak}`);

    // One-time migration: move any localStorage reflections -> Firestore
    await migrateLocalStorageReflections(user.uid);
  } catch (err) {
    logDebug("Failed to initialize app data", err);
  }
});

async function migrateLocalStorageReflections(uid) {
  try {
    const keysToMigrate = Object.keys(localStorage).filter(k => k.startsWith("reflection-"));
    if (keysToMigrate.length === 0) {
      logDebug("No localStorage reflections found for migration");
      return;
    }

    logDebug(`Found ${keysToMigrate.length} reflections in localStorage to migrate...`);

    const reflectionsMap = {};
    keysToMigrate.forEach(key => {
      const text = localStorage.getItem(key);
      if (text && text.trim()) {
        const dKey = key.replace("reflection-", "");
        reflectionsMap[dKey] = text;
      }
    });

    if (Object.keys(reflectionsMap).length > 0) {
      logDebug("Saving reflections to Firestore map...");
      await db.collection("users").doc(uid).set({ reflections: reflectionsMap }, { merge: true });
      
      // Verify upload before deleting
      const vSnap = await db.collection("users").doc(uid).get();
      const vData = vSnap.data()?.reflections || {};
      let verifiedCount = 0;
      for (let k in reflectionsMap) {
        if (vData[k] === reflectionsMap[k]) verifiedCount++;
      }

      if (verifiedCount === Object.keys(reflectionsMap).length) {
        logDebug(`Migration verified! Successfully uploaded ${verifiedCount} reflections.`);
        keysToMigrate.forEach(key => localStorage.removeItem(key));
      } else {
        logDebug(`Migration partial or failed verification (${verifiedCount}/${Object.keys(reflectionsMap).length} match). Keeping localStorage for safety.`);
      }
    } else {
      logDebug("localStorage reflections were empty strings, skipping upload.");
      keysToMigrate.forEach(key => localStorage.removeItem(key));
    }
  } catch (err) {
    logDebug("Migration failed", err);
  }
}

markBtn.onclick = async () => {
  const ref = db.collection("users").doc(auth.currentUser.uid);
  const data = (await ref.get()).data();

  const todayStr = new Date().toDateString();
  if (data.lastCheck === todayStr) {
    alert("Already marked for today!");
    return;
  }

  const yesterdayStr = new Date(Date.now() - 86400000).toDateString();

  const streak = data.lastCheck === yesterdayStr || data.lastCheck === null
    ? data.streak + 1 : 1;

  await ref.update({ streak, lastCheck: todayStr });
  currentStreak = streak;
  streakDisplay.innerText = `Current streak: ${streak} days`;
};

reflectBtn.onclick = async () => {
  const today = todayDate();
  calendarYear = today.getFullYear();
  calendarMonth = today.getMonth();
  await openReflection(today);
};

async function openReflection(date) {
  try {
    const dKey = dateKey(date);
    logDebug(`Opening reflection for ${dKey}...`);
    activeDate = date;
    reflectionText.value = "Loading...";
    reflectionText.disabled = true;
    reflectionModal.style.display = "flex";

    const uid = auth.currentUser.uid;
    const snap = await db.collection("users").doc(uid).get();
    const reflections = snap.data()?.reflections || {};
    const text = reflections[dKey] || "";
    
    reflectionText.value = text;
    logDebug(`Loaded text (length: ${text.length})`);

    const isToday = dKey === dateKey(todayDate());
    reflectionText.disabled = !isToday;
    saveBtn.style.display = isToday ? "block" : "none";
  } catch (err) {
    logDebug(`Failed to open reflection`, err);
    reflectionText.value = "Error loading from Firestore. Check logs below.";
  }
}

saveBtn.onclick = async () => {
  try {
    const uid = auth.currentUser.uid;
    const dKey = dateKey(activeDate);
    logDebug(`Saving reflection for ${dKey}...`);
    await db.collection("users").doc(uid).set({
      reflections: { [dKey]: reflectionText.value }
    }, { merge: true });
    logDebug("Save successful!");
    closeOverlays();
  } catch (err) {
    logDebug("Save failed", err);
    alert("Failed to save reflection to cloud: " + err.message);
  }
};

calendarBtn.onclick = async () => {
  const today = todayDate();
  calendarYear = today.getFullYear();
  calendarMonth = today.getMonth();
  initSelectors();
  await renderCalendar();
  calendarOverlay.style.display = "flex";
};

function initSelectors() {
  monthSelect.innerHTML = "";
  yearSelect.innerHTML = "";

  MONTHS.forEach((m, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = m;
    monthSelect.appendChild(opt);
  });

  const currentYear = todayDate().getFullYear();
  for (let y = currentYear; y >= currentYear - 15; y--) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
  }

  syncSelectors();
}

function syncSelectors() {
  monthSelect.value = calendarMonth;
  yearSelect.value = calendarYear;
}

monthSelect.onchange = () => {
  calendarMonth = Number(monthSelect.value);
  renderCalendar();
};

yearSelect.onchange = () => {
  calendarYear = Number(yearSelect.value);
  renderCalendar();
};

prevMonthBtn.onclick = () => {
  calendarMonth--;
  if (calendarMonth < 0) {
    calendarMonth = 11;
    calendarYear--;
  }
  syncSelectors();
  renderCalendar();
};

nextMonthBtn.onclick = () => {
  calendarMonth++;
  if (calendarMonth > 11) {
    calendarMonth = 0;
    calendarYear++;
  }
  syncSelectors();
  renderCalendar();
};

async function renderCalendar() {
  calendarGrid.innerHTML = "";

  const snap = await db.collection("users").doc(auth.currentUser.uid).get();
  const data = snap.data();
  const allReflections = data?.reflections || {};
  const streak = data?.streak || 0;

  const today = todayDate();
  // Streak start = today minus streak days + 1
  const streakStart = new Date(today);
  streakStart.setDate(today.getDate() - streak + 1);
  streakStart.setHours(0,0,0,0);

  // Extend streak window backwards to group recent continuous reflections
  let extendedStart = new Date(streakStart);
  while (true) {
    let prev = new Date(extendedStart);
    prev.setDate(prev.getDate() - 1);
    let pk = dateKey(prev);
    if (allReflections[pk] && allReflections[pk].trim()) {
      extendedStart.setDate(extendedStart.getDate() - 1);
    } else {
      break;
    }
  }

  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calendarYear, calendarMonth, d);
    date.setHours(0,0,0,0);

    const cell = document.createElement("div");
    cell.className = "calendar-day";
    cell.innerText = d;

    const inVisibleWindow = date >= extendedStart && date <= today;
    const dKey = dateKey(date);
    const hasReflection = allReflections[dKey] && allReflections[dKey].trim();

    if (inVisibleWindow) {
      cell.classList.add("active");
      if (hasReflection) {
        cell.style.background = "rgba(0,255,170,0.3)";
        cell.style.fontWeight = "bold";
      }
    } else {
      cell.classList.add("past");
      if (hasReflection) {
        // "greyed out since discontinued, though it does have reflections"
        cell.style.background = "rgba(255,255,255,0.05)"; // very faint indication
        cell.style.cursor = "pointer";
      }
    }

    if (inVisibleWindow || hasReflection) {
      cell.onclick = async () => {
        calendarOverlay.style.display = "none";
        await openReflection(date);
      };
    }
    
    calendarGrid.appendChild(cell);
  }
}

function closeOverlays() {
  reflectionModal.style.display = "none";
  calendarOverlay.style.display = "none";
  aiSummaryOverlay.style.display = "none";
}

document.querySelectorAll(".overlay").forEach(ov => {
  ov.addEventListener("click", e => {
    if (e.target === ov) closeOverlays();
  });
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeOverlays();
});

closeSummaryBtn.onclick = closeOverlays;

logoutBtn.onclick = () => auth.signOut();
resetBtn.onclick = async () => {
  if (!confirm("Reset your streak?")) return;

  const ref = db.collection("users").doc(auth.currentUser.uid);

  await ref.update({
    streak: 0,
    lastCheck: null
  });

  currentStreak = 0;
  streakDisplay.innerText = "Current streak: 0 days";
};

/* ✅ AI SUMMARY WITH CHART & DATE RANGE FILTERING */

async function getReflectionsByDateRange(startDate, endDate) {
  const uid = auth.currentUser.uid;
  const snap = await db.collection("users").doc(uid).get();
  const allReflections = snap.data()?.reflections || {};

  // Fix: parse date strings as LOCAL time (not UTC) to avoid timezone shift
  // "2026-03-15" parsed by new Date() = UTC midnight = Mar 14 in IST!
  function parseDateLocal(d) {
    if (typeof d === "string") {
      const [y, m, day] = d.split("-").map(Number);
      return new Date(y, m - 1, day);
    }
    return d;
  }

  const startKey = dateKey(parseDateLocal(startDate));
  const endKey = dateKey(parseDateLocal(endDate));

  const reflections = [];
  for (let dKey in allReflections) {
    if (dKey >= startKey && dKey <= endKey) {
      if (allReflections[dKey] && allReflections[dKey].trim()) {
        reflections.push(allReflections[dKey]);
      }
    }
  }

  console.log("Reflections found in Firestore map:", reflections.length);
  return reflections;
}

function drawPieChart(positive, neutral, negative) {
  const canvas = document.getElementById("emotionChart");
  const ctx = canvas.getContext("2d");
  
  const total = positive + neutral + negative;
  if (total === 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff99';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('No emotions detected', 100, 100);
    return;
  }
  
  const centerX = 100;
  const centerY = 100;
  const radius = 70;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const colors = ['#00ff99', '#ffaa00', '#ff4444'];
  const labels = ['Positive', 'Neutral', 'Negative'];
  const values = [positive, neutral, negative];
  
  let currentAngle = -Math.PI / 2;
  
  // Draw pie slices
  values.forEach((value, index) => {
    const sliceAngle = (value / total) * 2 * Math.PI;
    
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
    ctx.closePath();
    ctx.fillStyle = colors[index];
    ctx.fill();
    
    currentAngle += sliceAngle;
  });
  
  // Draw labels below the chart
  const legendY = 170;
  const legendSpacing = 65;
  
  values.forEach((value, index) => {
    const x = 10 + (index * legendSpacing);
    
    // Draw color box
    ctx.fillStyle = colors[index];
    ctx.fillRect(x, legendY, 12, 12);
    
    // Draw label text
    ctx.fillStyle = colors[index];
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(labels[index], x + 16, legendY + 10);
    
    // Draw percentage
    ctx.font = '10px Arial';
    ctx.fillText(`${Math.round(value/total*100)}%`, x + 16, legendY + 22);
  });
}

function setDateRange(days) {
  const today = todayDate();
  const endDateInput = document.getElementById('endDate');
  const startDateInput = document.getElementById('startDate');
  
  // Use .value with dateKey() strings instead of .valueAsDate
  // .valueAsDate interprets dates as UTC, but todayDate() is local midnight.
  // In IST (UTC+5:30), local midnight = previous day in UTC → off-by-one!
  endDateInput.value = dateKey(today);
  
  if (days === 'streak') {
    const start = new Date(today);
    start.setDate(today.getDate() - currentStreak + 1);
    startDateInput.value = dateKey(start);
  } else if (days === 'all') {
    // Fix: read earliest reflection from Firestore, not localStorage
    const uid = auth.currentUser?.uid;
    if (uid) {
      db.collection("users").doc(uid).get().then(snap => {
        const allReflections = snap.data()?.reflections || {};
        const keys = Object.keys(allReflections).sort();
        if (keys.length > 0) {
          startDateInput.value = keys[0]; // already YYYY-MM-DD
        } else {
          startDateInput.value = dateKey(today);
        }
      });
    } else {
      startDateInput.value = dateKey(today);
    }
  } else {
    const start = new Date(today);
    start.setDate(today.getDate() - days + 1);
    startDateInput.value = dateKey(start);
  }
}

aiSummaryBtn.onclick = async () => {
  aiSummaryOverlay.style.display = "flex";
  
  // Set default to current streak
  setDateRange('streak');
  
  // Setup quick buttons
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.preventDefault();
      const days = btn.getAttribute('data-days');
      setDateRange(days);
    };
  });
  
  // Setup apply button
  document.getElementById('applyDateRangeBtn').onclick = async () => {
    await loadSummary();
  };
  
  await loadSummary();
};

async function loadSummary() {
  try {
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    
    if (!startDateInput.value || !endDateInput.value) {
      alert("Please select both start and end dates!");
      return;
    }
    
    // Fix: parse date input values as LOCAL time, not UTC
    // input.value is "YYYY-MM-DD" — new Date() treats it as UTC, causing -1 day in IST
    function parseDateInputLocal(val) {
      const [y, m, d] = val.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    const startDate = parseDateInputLocal(startDateInput.value);
    const endDate = parseDateInputLocal(endDateInput.value);
    
    if (startDate > endDate) {
      alert("Start date must be before end date!");
      return;
    }
    
    const reflections = await getReflectionsByDateRange(startDate, endDate);
    
    if (reflections.length === 0) {
      document.getElementById("summaryText").innerHTML = "<p>No reflections found in the selected date range!</p>";
      const canvas = document.getElementById("emotionChart");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      return;
    }

    document.getElementById("summaryText").innerHTML = "<p>Analyzing your reflections...</p>";

    const res = await summarizeReflections({ reflections });
    
    const summary = res.data.summary;
    const emotions = res.data.emotions;
    
    const daysDiff = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
    
    document.getElementById("summaryText").innerHTML = 
      `<div class="summary-stats">
        <p><strong>Date Range:</strong> ${startDateInput.value} to ${endDateInput.value}</p>
        <p><strong>Days in Range:</strong> ${daysDiff} days</p>
        <p><strong>Days with Reflections:</strong> ${reflections.length}</p>
        <p><strong>Completion Rate:</strong> ${Math.round((reflections.length / daysDiff) * 100)}%</p>
      </div>
      <div class="summary-detail">${summary.replace(/\n/g, '<br>')}</div>`;
    
    drawPieChart(emotions.positive, emotions.neutral, emotions.negative);

  } catch (err) {
    console.error(err);
    alert("Failed to generate AI summary.");
    closeOverlays();
  }
}
